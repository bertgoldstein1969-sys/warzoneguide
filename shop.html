<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warzone Shop — Meta Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/logo-wm.png" />
</head>
<body>
<nav>
  <div class="nav-logo"><img src="assets/logo-shield.png" alt="Warzone Meta Hub logo" class="nav-logo-img"/><span>Warzone Meta Hub</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Tier List</a></li>
    <li><a href="patch-notes.html">Patch Notes</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="updates.html">News</a></li>
  </ul>
</nav>
<div class="section">
  <div class="section-head">
    <h1>Recommended Gear Shop</h1>
    <p class="muted">Affiliate links — prices may change.</p>
  </div>
  <img src="assets/shop-gear.png" alt="Gaming gear setup" class="page-hero-img" />
  <div id="shop-grid" class="shop-grid"></div>
</div>
<footer><p>Warzone Meta Hub — fan-run site.</p><p class="muted"><a href="about.html">About</a> · <a href="contact.html">Contact</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="affiliate-disclosure.html">Affiliate Disclosure</a></p></footer>
<script>
const DATA_URL='https://cdn.jsdelivr.net/gh/bertgoldstein1969-sys/warzone-data@main/warzone-data.json';
const esc=(s='')=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const defaults=[
  {name:'Pro Controller',category:'Controller',note:'Low-latency + rear paddles',url:'https://www.amazon.com/?tag=REPLACE_WITH_TAG'},
  {name:'Tournament Headset',category:'Audio',note:'Footstep clarity + directional imaging',url:'https://www.amazon.com/?tag=REPLACE_WITH_TAG'},
  {name:'Performance Thumbsticks',category:'Accessories',note:'Fine-aim control for long-range beams',url:'https://www.amazon.com/?tag=REPLACE_WITH_TAG'}
];
(async()=>{
  const el=document.getElementById('shop-grid');
  try{
    const data=await (await fetch(DATA_URL,{cache:'no-store'})).json();
    const list=(data.shopProducts&&data.shopProducts.length)?data.shopProducts:defaults;
    el.innerHTML=list.map(p=>`<article class="shop-card"><p class="badge">${esc(p.category||'Gear')}</p><h3>${esc(p.name||'Item')}</h3><p>${esc(p.note||'')}</p><a class="btn" href="${esc(p.url||'#')}" target="_blank" rel="sponsored noopener">Check on Amazon</a></article>`).join('');
  }catch(e){
    el.innerHTML=defaults.map(p=>`<article class="shop-card"><p class="badge">${esc(p.category)}</p><h3>${esc(p.name)}</h3><p>${esc(p.note)}</p><a class="btn" href="${esc(p.url)}" target="_blank" rel="sponsored noopener">Check on Amazon</a></article>`).join('');
  }
})();
</script>
</body>
</html>
